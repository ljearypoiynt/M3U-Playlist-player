name: Build and Push Gateway Image

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "M3UPlaylistPlayer.Gateway/**"
      - "M3UPlaylistPlayer.Desktop/Models/**"
      - "M3UPlaylistPlayer.Desktop/Remote/**"
      - "M3UPlaylistPlayer.Desktop/Services/**"
      - "Dockerfile"
      - ".dockerignore"
      - "k8s/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches:
      - main
      - master
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ljearypoiynt/m3u-playlist-player/gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Kustomization with new image tag
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        run: |
          IMAGE_TAG="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
          echo "Updating k8s/kustomization.yaml with image tag: ${IMAGE_TAG}"
          sed -i "s|newTag: .*|newTag: ${IMAGE_TAG}|g" k8s/kustomization.yaml

      - name: Commit and push image tag
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        run: |
          IMAGE_TAG="${GITHUB_REF_NAME}-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No image tag changes to commit"
          else
            git commit -m "chore: update gateway image tag to ${IMAGE_TAG} [skip ci]"
            git push
          fi

      - name: Update Kustomization for release
        if: github.event_name == 'release'
        run: |
          sed -i "s|newTag: .*|newTag: ${{ github.event.release.tag_name }}|g" k8s/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No image tag changes to commit"
          else
            git commit -m "chore: update gateway image tag to ${{ github.event.release.tag_name }}"
            git push
          fi
