apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: iptv-sidekick-project
  namespace: argocd
  finalizers:
    - argoproj.io/resources-finalizer
spec:
  description: IPTV Sidekick gateway

  destinations:
    - namespace: m3u-playlist-player
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: ""
      kind: Namespace

  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

  sourceRepos:
    - git@github.com:ljearypoiynt/M3U-Playlist-player.git

  orphanedResources:
    warn: true
